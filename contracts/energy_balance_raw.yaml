dataContractSpecification: 1.1.0
id: contract-first-energy-raw-v1
info:
  title: EU Energy Balance Raw Data
  version: 0.3.0
  status: active
  description: >
    Raw Eurostat energy balance data (nrg_bal_c) before staging transformations.
    This contract defines the expected schema, quality rules, and governance
    metadata for the source layer of the Contract First data warehouse.
    Every transformation in the staging layer must trace back to a rule here.
    Aligned with ODCS v3.1.0 (Bitol / Linux Foundation).
  owner: Michal Mrugala
  contact:
    name: Michal Mrugala
    url: https://architecture-first.beehiiv.com

servers:
  local:
    type: local
    path: warehouse.duckdb
    format: duckdb

terms:
  usage: >
    Analytics and reporting on EU energy consumption patterns.
    Educational project — Contract First build-in-public series.
  limitations: >
    Source data must be attributed to Eurostat.
    No redistribution without proper attribution.
  billing: Free (Eurostat open data)
  noticePeriod: N/A

models:
  raw_energy:
    description: >
      Raw energy balance data as loaded from Eurostat SDMX-CSV export.
      One row = one observation (country + balance item + energy product + unit + year).
    fields:
      DATAFLOW:
        type: string
        required: false
        description: >
          SDMX metadata field identifying the dataflow.
          Not part of the analytical model — drop in staging.
      LAST_UPDATE:
        type: string
        required: false
        description: >
          SDMX metadata field showing when Eurostat last updated this record.
          Not part of the analytical model — drop in staging.
      freq:
        type: string
        required: true
        description: >
          Frequency of observation. Always 'A' (annual) for this dataset.
        enum:
          - A
      nrg_bal:
        type: string
        required: true
        description: >
          Energy balance item code. Defines what aspect of the energy balance
          this row measures (e.g., NRGSUP = total energy supply,
          PPRD = primary production, IMP = imports, EXP = exports).
          142 unique codes in the dataset.
        examples:
          - NRGSUP
          - PPRD
          - IMP
          - EXP
          - GIC
          - FC_E
      siec:
        type: string
        required: true
        description: >
          Standard International Energy Product Classification code.
          72 unique product codes with implicit 3-level hierarchy
          (reconstructed in Dim_EnergyProduct, Week 3).
        examples:
          - TOTAL
          - C0000X0350-0370
          - O4000XBIO
          - G3000
          - RA000
          - N9000
          - E7000
      unit:
        type: string
        required: true
        description: >
          Unit of measurement. Every observation exists in all 3 units.
          TJ = terajoules, KTOE = kilotonnes of oil equivalent, GWH = gigawatt hours.
        enum:
          - TJ
          - KTOE
          - GWH
      geo:
        type: string
        required: true
        description: >
          Country or geographic aggregate code.
          ISO 3166-1 alpha-2 for individual countries (DE, FR, PL).
          Eurostat aggregate codes for groups (EU27_2020, EA20).
          41 unique values: 40 individual countries + aggregates.
          Aggregates excluded from star schema (Week 3 decision).
        minLength: 2
        maxLength: 10
      TIME_PERIOD:
        type: integer
        required: true
        description: >
          Year of observation. Annual data covering 35 years.
        minimum: 1990
        maximum: 2024
      OBS_VALUE:
        type: number
        required: false
        description: >
          Observed value in the specified unit. NULL when data
          is unavailable or not applicable (flagged 'm' in OBS_FLAG).
          Negative values ARE valid (exports, stock changes).
          46.14% of all observations have NULL OBS_VALUE.
      OBS_FLAG:
        type: string
        required: false
        description: >
          Observation status flag from Eurostat.
          In practice only 2 values in this dataset:
          NULL = validated observation with numeric value (53.86%)
          'm' = missing/unavailable (46.14%).
          Other possible flags per Eurostat spec: p, e, c, n, d, u, z.
        enum:
          - p
          - e
          - c
          - n
          - d
          - u
          - z
          - m
          - null
      CONF_STATUS:
        type: string
        required: false
        description: >
          Confidentiality status from SDMX format.
          Entirely NULL in this dataset — Eurostat included the column
          but did not populate it. Excluded from star schema.

quality:
  type: custom-sql
  description: >
    Quality rules from Week 1 (structural) and Week 2 (completeness).
    Each rule maps to SQL checks in sql/quality/.
    Rules tested BEFORE any staging transformation runs.
  specification:
    structural_rules:
      - name: no_null_geo
        description: Country code must never be NULL.
        sql_check: COUNT(*) FILTER (WHERE geo IS NULL) = 0
        severity: critical

      - name: valid_year_range
        description: TIME_PERIOD must be between 1990 and 2024.
        sql_check: COUNT(*) FILTER (WHERE TIME_PERIOD < 1990 OR TIME_PERIOD > 2024) = 0
        severity: critical

      - name: no_null_nrg_bal
        description: Balance item code must never be NULL.
        sql_check: COUNT(*) FILTER (WHERE nrg_bal IS NULL) = 0
        severity: critical

      - name: no_null_unit
        description: Unit of measurement must never be NULL.
        sql_check: COUNT(*) FILTER (WHERE unit IS NULL) = 0
        severity: critical

      - name: valid_units_only
        description: Unit must be TJ, KTOE, or GWH.
        sql_check: COUNT(*) FILTER (WHERE unit NOT IN ('TJ', 'KTOE', 'GWH')) = 0
        severity: warning

      - name: annual_frequency_only
        description: Frequency must be 'A' (annual).
        sql_check: COUNT(*) FILTER (WHERE freq != 'A') = 0
        severity: warning

      - name: no_duplicate_keys
        description: Natural key (geo + nrg_bal + siec + unit + TIME_PERIOD) must be unique.
        severity: critical

      - name: row_count_minimum
        description: Dataset must have at least 100,000 rows.
        sql_check: COUNT(*) >= 100000
        severity: critical

      - name: geo_code_length
        description: Country codes should not exceed 10 characters.
        sql_check: COUNT(*) FILTER (WHERE LENGTH(geo) > 10) = 0
        severity: warning

    completeness_rules:
      - name: unit_distribution_equal
        description: Each unit (TJ, KTOE, GWH) should have ~33.33% of rows.
        severity: warning

      - name: completeness_coverage
        description: Expected completeness is 53.86%. Uniform across all countries.
        severity: info
        expected_value: 53.86

      - name: no_rejected_rows
        description: Rejected staging tier must have 0 rows.
        sql_check: COUNT(*) = 0 (on stg_energy_rejected)
        severity: critical

  completeness:
    expected_coverage_pct: 53.86
    missing_reason: >
      Product sparsity — Eurostat defines 72 energy product categories
      but most countries do not produce all of them.
      Every country has identical 53.2% coverage (structural, not random).
    missing_count: 18218538
    action: exclude_from_fact_table
    documentation: docs/quality-report-week2.md

  staging:
    tiers:
      clean: 21268329
      missing: 18218538
      rejected: 0
    total: 39486867
    fact_table_preview: 6903138
    reduction_from_raw: "82%"

links:
  source_dataset: https://ec.europa.eu/eurostat/databrowser/view/nrg_bal_c/default/table?lang=en
  source_api: https://ec.europa.eu/eurostat/api/dissemination/sdmx/2.1/data/nrg_bal_c/?format=SDMX-CSV&compressed=true
  specification: https://github.com/datacontract/datacontract-specification
  odcs_standard: https://bitol-io.github.io/open-data-contract-standard/

x_legal_basis:
  gdpr_applicable: false
  reason: >
    No personal data. Public statistical data published by Eurostat
    under the European Commission's open data policy.
    All observations are national-level aggregates.
  license: CC BY 4.0 Eurostat
  data_protection_impact_assessment_required: false
  processing_record_required: false
  retention_policy: >
    Data retained for project duration and educational purposes.
    Source data freely re-downloadable from Eurostat at any time.
  note_for_week_7: >
    In Week 7 we add the full governance layer — GDPR Article 30 records,
    data lineage, and retention documentation.

# ═══════════════════════════════════════════════════════
# Star Schema Model Governance (Week 3)
# ═══════════════════════════════════════════════════════

star_schema:
  schema_type: star
  fact_tables:
    - name: Fact_EnergyBalance
      grain: "one measured observation per country, product, balance item, unit, year"
      row_count: 20709414
      measures:
        - obs_value
      dimensions:
        - Dim_Country
        - Dim_EnergyProduct
        - Dim_BalanceItem
        - Dim_Unit
        - Dim_Year
        - Dim_ObsStatus
  dimension_details:
    Dim_Country:
      rows: 40
      note: Individual countries only. Aggregates (EU27_2020, EA20) excluded.
    Dim_EnergyProduct:
      rows: 72
      hierarchy_levels: 3
      mapped: 49
      unmapped_as_other: 23
    Dim_BalanceItem:
      rows: 142
      categories: 5
    Dim_Unit:
      rows: 3
      values: [TJ, KTOE, GWH]
    Dim_Year:
      rows: 35
      range: 1990-2024
    Dim_ObsStatus:
      rows: 2
      values: [measured, missing]
  design_decisions:
    - decision: Exclude geographic aggregates (EU27_2020)
      reasoning: Prevents double-counting. Users SUM individual countries.
    - decision: Missing rows excluded from fact table
      reasoning: 18.2M NULL rows documented in stg_energy_missing, not in fact table.
    - decision: Unit as dimension, all 3 units kept
      reasoning: SQL First — solve unit selection in warehouse, not in DAX.
    - decision: OBS_FLAG not promoted to full dimension
      reasoning: Only 2 values. All fact rows are measured. Dim_ObsStatus for audit.
    - decision: Energy product hierarchy reconstructed manually
      reasoning: Eurostat provides no parent-child mapping. SDMX codelist used.
  validation:
    null_obs_values: 0
    orphan_keys: 0
    grain_unique: true
  key_findings:
    - "Norway #1 in total energy production (1,059,228,378 TJ cumulative)"
    - "Germany renewables: 10.8x growth from 285,924 TJ (1990) to 3,100,935 TJ (2024)"

