      nrg_bal: { type: string, required: true }
      siec: { type: string, required: true }
      unit: { type: string, required: true, enum: [TJ, KTOE, GWH] }
      geo: { type: string, required: true, minLength: 2, maxLength: 10 }
      TIME_PERIOD: { type: integer, required: true, minimum: 1990, maximum: 2024 }
      OBS_VALUE: { type: number, required: false }
      OBS_FLAG: { type: string, required: false }
      CONF_STATUS: { type: string, required: false }

