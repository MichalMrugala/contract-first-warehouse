# ═══════════════════════════════════════════════════════
# Multi-Entity Deployer Arrangement (NEW in v0.5)
#
# This is the composable pattern that single-deployer YAML cannot
# represent. One row per entity, one row per joint responsibility,
# one explicit boundary for hybrid usage.
#
# The pattern is illustrative — entity_id values are placeholders
# and would be replaced with actual legal entity identifiers in a
# real implementation.
# ═══════════════════════════════════════════════════════

deployer_arrangement:
  arrangement_type: "joint"
  written_agreement_ref: "JDA-2026-001"
  written_agreement_location: "docs/joint_deployer_agreement.pdf"
  effective_from: "2026-01-01"
  next_review_date: "2026-12-31"

  entities:
    - entity_id: "GROUP_PARENT_DE"
      legal_name: "[Parent Group GmbH]"
      jurisdiction: "DE"
      role: "procuring_deployer"
      authority_basis: "Article 3(8) — policy authority + procurement contract"
      systems_under_authority: ["model_governance", "audit_oversight"]

    - entity_id: "SUBSIDIARY_PL"
      legal_name: "[Subsidiary Sp. z o.o.]"
      jurisdiction: "PL"
      role: "operating_deployer"
      authority_basis: "Article 3(8) — technical operation + day-to-day control"
      systems_under_authority: ["pipeline_execution", "incident_response"]

    - entity_id: "RETAIL_ARM"
      legal_name: "[Retail Arm GmbH]"
      jurisdiction: "DE"
      role: "non_regulated_consumer"
      authority_basis: "Out of Article 10 scope — uses platform for non-high-risk purposes only"
      systems_under_authority: []

  joint_responsibilities:
    bias_examination:
      lead: "GROUP_PARENT_DE"
      reviewer: "SUBSIDIARY_PL"
      cadence: "quarterly"
      escalation_to: "GROUP_PARENT_DE"

    data_governance_oversight:
      lead: "GROUP_PARENT_DE"
      reviewer: "SUBSIDIARY_PL"
      cadence: "annual"

    incident_escalation:
      tier_1_responder: "SUBSIDIARY_PL"
      tier_2_escalation: "GROUP_PARENT_DE"
      sla_hours:
        critical: 4
        high: 24
        medium: 72
      regulator_notification_authority: "GROUP_PARENT_DE"

    audit_response:
      primary_contact: "GROUP_PARENT_DE"
      technical_contact: "SUBSIDIARY_PL"
      record_custodian: "GROUP_PARENT_DE"

  hybrid_usage_boundary:
    description: >
      The same platform is used by entities for both regulated
      (Article 10 in scope) and non-regulated (out of scope) purposes.
      The boundary itself is a contract field — a regulator asking
      which subsidiary is in scope receives a single authoritative
      answer instead of a meeting.
    regulated_scope:
      entities: ["SUBSIDIARY_PL"]
      isolation: "RLS"
      isolation_implementation: "row-level security on tenant_id column"
      monitored: true
    non_regulated_scope:
      entities: ["RETAIL_ARM"]
      isolation: "schema"
      isolation_implementation: "separate database schema, separate role grants"
      monitored: false
    boundary_audit:
      method: "monthly query inspecting cross-schema access logs"
      sql_file: "sql/quality/16_hybrid_boundary_audit.sql"

# ═══════════════════════════════════════════════════════
# Article 3(8) — Per-Entity Authority Analysis (NEW in v0.5)
#
# Article 3(8) defines a deployer as: "any natural or legal person...
# using an AI system under its authority." The analysis must be
# performed per entity. A subsidiary running the platform technically
# is a deployer. The parent procuring and policing is also a deployer.
# Both. That is the joint deployer condition.
# ═══════════════════════════════════════════════════════

x_ai_act_article_3_8:
  applicable: true
  per_entity_analysis:
    - entity_id: "GROUP_PARENT_DE"
      is_deployer: true
      authority_dimensions:
        procurement: "yes — signed master agreement with provider"
        policy: "yes — sets data governance and risk policies"
        technical_operation: "no — does not run the pipeline"
        end_use_decision: "yes — defines permissible use cases"
      conclusion: >
        Procuring deployer. Has policy authority and end-use authority
        but not day-to-day technical control. Joint deployer per
        Article 3(8) by virtue of policy and procurement.

    - entity_id: "SUBSIDIARY_PL"
      is_deployer: true
      authority_dimensions:
        procurement: "no — operates under parent contract"
        policy: "partial — implements parent policies, sets local SLAs"
        technical_operation: "yes — runs pipelines, owns infrastructure"
        end_use_decision: "partial — within parent-defined permissible uses"
      conclusion: >
        Operating deployer. Has technical authority and operational
        control. Joint deployer per Article 3(8) by virtue of
        day-to-day technical operation.

    - entity_id: "RETAIL_ARM"
      is_deployer: false
      authority_dimensions:
        procurement: "no"
        policy: "no"
        technical_operation: "no"
        end_use_decision: "scoped to non-high-risk uses only"
      conclusion: >
        Not a deployer for Article 10 purposes. Uses the shared platform
        for non-high-risk purposes. Hybrid boundary keeps this entity
        out of scope; isolation is enforced at schema level.

# ═══════════════════════════════════════════════════════
# Article 26 — Joint Deployer Obligation Matrix (NEW in v0.5)
#
# The AI Act does not contain a direct mirror of GDPR Article 26.
# However, Article 26 of the AI Act (Obligations of deployers of
# high-risk AI systems) applies to each deployer. When two entities
# are joint deployers under Article 3(8), each owes the full set
# of Article 26 obligations.
#
# GDPR Article 26 ("Joint controllers shall in a transparent manner
# determine their respective responsibilities") supplies the
# written-agreement test by analogy. The CJEU built this doctrine
# across three cases:
#   - C-210/16 (Wirtschaftsakademie Schleswig-Holstein, 2018):
#     joint controllership without direct technical access; decisive
#     influence as the controlling test.
#   - C-25/17 (Jehovah's Witnesses / Tietosuojavaltuutettu, 2018):
#     joint determination of purposes and means even when one party
#     never touches the data.
#   - C-40/17 (Fashion ID, 2019): doctrine extends to embedded-
#     component scenarios where one party enables another's processing.
#
# The principle survives translation: authority plus decision rights
# equals joint deployer status under AI Act Article 26. In the
# joint-deployer arrangement, each entity carries its allocated
# responsibilities, but joint accountability is preserved.
# ═══════════════════════════════════════════════════════

x_ai_act_article_26:
  applicable: true
  joint_deployer: true
  written_agreement_required: true
  written_agreement_ref: "JDA-2026-001"

  legal_anchor:
    primary: "AI Act Article 26 (Obligations of deployers of high-risk AI systems)"
    primary_text_reference: "Regulation (EU) 2024/1689, Article 26"
    analogy_basis: "GDPR Article 26 (Joint controllers) — written-agreement test"
    cjeu_reference_cases:
      - case: "C-210/16"
        name: "Wirtschaftsakademie Schleswig-Holstein"
        year: 2018
        established: "decisive influence as the controlling test for joint controllership"
        relevance: "establishes that joint status exists without direct technical access"
      - case: "C-25/17"
        name: "Jehovah's Witnesses (Tietosuojavaltuutettu)"
        year: 2018
        established: "joint determination of purposes and means even when one party never touches the data"
        relevance: "applies when parent entity sets purposes but does not handle data directly"
      - case: "C-40/17"
        name: "Fashion ID"
        year: 2019
        established: "doctrine extends to embedded-component scenarios"
        relevance: "applies when one entity enables another's processing on a shared platform"

  obligation_matrix:
    article_26_1_appropriate_technical_organisational_measures:
      lead: "SUBSIDIARY_PL"
      shared: ["GROUP_PARENT_DE"]
      evidence: "deployer_arrangement.joint_responsibilities.data_governance_oversight"

    article_26_2_human_oversight:
      lead: "SUBSIDIARY_PL"
      shared: ["GROUP_PARENT_DE"]
      evidence: "sql/model — role_assignments table maps oversight role to current person"

    article_26_3_input_data_relevance:
      lead: "SUBSIDIARY_PL"
      shared: ["GROUP_PARENT_DE"]
      evidence: "contracts/energy_balance_v0.4.yaml — relevance_assessment block"

    article_26_4_monitoring_operation:
      lead: "SUBSIDIARY_PL"
      shared: ["GROUP_PARENT_DE"]
      evidence: "sql/quality/15_star_schema_tests.sql + audit ledger"

    article_26_5_logging_record_keeping:
      lead: "SUBSIDIARY_PL"
      shared: ["GROUP_PARENT_DE"]
      evidence: "Article 10 audit ledger — append-only by database role"

    article_26_6_inform_workers:
      lead: "GROUP_PARENT_DE"
      shared: []
      evidence: "out of contract scope — managed via HR policy"

    article_26_7_data_protection_impact:
      lead: "GROUP_PARENT_DE"
      shared: ["SUBSIDIARY_PL"]
      evidence: "out of contract scope — separate DPIA artifact"

    article_26_8_incident_reporting:
      lead: "GROUP_PARENT_DE"
      shared: ["SUBSIDIARY_PL"]
      evidence: "deployer_arrangement.joint_responsibilities.incident_escalation"

# ═══════════════════════════════════════════════════════
# Failure modes — preserved from v0.4 with multi-entity additions
# ═══════════════════════════════════════════════════════

x_failure_modes_twelve_month:
  - mode: "ledger_becomes_write_only"
    description: "Pipelines append; no one reads. Audit log silently rots."
    prevention: "Quarterly review query embedded in contract with hard next_review_date. Missed review fires its own ledger entry: review_skipped. The contract breaches itself, audibly."

  - mode: "schema_drift_uncovered"
    description: "New AI use case ships without contract update."
    prevention: "BEFORE INSERT trigger checks article_10_registered_systems table. Unregistered system_id raises an exception. Pipeline cannot write until registration is explicit."

  - mode: "cross_entity_escalation_decay"
    description: "Joint committee stops meeting. Tier-2 acks stop. Original signers leave. Accountability evaporates."
    prevention: >
      Accountability held by responsible_role, never by personal email.
      role_assignments table maps role to current person with
      effective_from / effective_to columns. People change; the
      contract does not. This is the multi-entity-specific failure
      mode — it does not exist in single-deployer arrangements.

