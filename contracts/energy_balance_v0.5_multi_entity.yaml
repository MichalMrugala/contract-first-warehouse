dataContractSpecification: 1.1.0
id: contract-first-energy-multi-entity-v1
info:
  title: EU Energy Balance Raw Data — Multi-Entity Joint Deployer Reference
  version: 0.5.0
  status: active
  description: >
    Extends contracts/energy_balance_v0.4.yaml with the multi-entity
    joint-deployer pattern. Where v0.4 documents a single-deployer
    Article 10 mapping, v0.5 demonstrates the contract structure
    required when an AI system is operated jointly across multiple
    legal entities (parent and subsidiaries, or regulated and
    non-regulated business units sharing one platform).

    The multi-entity case is where Article 3(8) "under its authority"
    gets tested. When a subsidiary operates a shared platform that
    the parent procured and policied, both have authority — technically
    and procurally. Single-deployer YAML cannot represent this.

    This contract adds three blocks:
      - deployer_arrangement: composable joint-deployer pattern
      - x_ai_act_article_3_8: per-entity authority analysis
      - x_ai_act_article_26: joint deployer obligation matrix
        with GDPR Article 26 written-agreement test by analogy

    All v0.4 quality, schema, and lineage content is preserved.
    The Eurostat dataset itself is not personal data and is not used
    for AI training — the multi-entity example uses the same source
    schema for didactic continuity with v0.4.

    Aligned with ODCS v3.1.0 (Bitol / Linux Foundation).
  owner: Michal Mrugala
  contact:
    name: Michal Mrugala
    url: https://architecture-first.beehiiv.com

servers:
  local:
    type: local
    path: warehouse.duckdb
    format: duckdb

terms:
  usage: >
    Analytics and reporting on EU energy consumption patterns.
    Educational project — Contract First build-in-public series.
    Multi-entity reference is illustrative; do not deploy verbatim
    in production without entity-specific legal review.
  limitations: >
    Source data must be attributed to Eurostat.
    No redistribution without proper attribution.
    Multi-entity patterns require qualified legal counsel review
    in production deployments — this contract is reference, not advice.
  billing: Free (Eurostat open data)
  noticePeriod: N/A

