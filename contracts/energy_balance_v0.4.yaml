# ═══════════════════════════════════════════════════════
# Data Lineage — Full Pipeline Documentation
# ═══════════════════════════════════════════════════════

x_data_lineage:
  pipeline_name: "Contract First Energy Warehouse"
  stages:
    - stage: 1_source
      name: "Eurostat SDMX-CSV"
      input: "https://ec.europa.eu/eurostat/api/dissemination/sdmx/2.1/data/nrg_bal_c/"
      output: "raw/nrg_bal_c.csv"
      format: "SDMX-CSV (compressed)"
      rows: 39486867
      license: "CC BY 4.0"

    - stage: 2_ingestion
      name: "DuckDB raw load"
      input: "raw/nrg_bal_c.csv"
      output: "warehouse.duckdb → raw_energy table"
      method: "CREATE TABLE raw_energy AS SELECT * FROM read_csv_auto('raw/nrg_bal_c.csv')"
      sql_file: "sql/explore/01_exploration.sql"
      rows: 39486867

    - stage: 3_quality_gates
      name: "Automated quality validation"
      input: "raw_energy"
      output: "quality_gate_results table"
      sql_file: "sql/quality/04_quality_gates.sql"
      rules: 12
      result: "8/8 structural PASS, 1/1 consistency PASS"

    - stage: 4_staging
      name: "3-tier staging"
      input: "raw_energy"
      output: "stg_energy_clean, stg_energy_missing, stg_energy_rejected"
      sql_file: "sql/staging/06_staging_v2.sql"
      clean_rows: 21268329
      missing_rows: 18218538
      rejected_rows: 0

    - stage: 5_star_schema
      name: "Dimensional model"
      input: "stg_energy_clean"
      output: "Fact_EnergyBalance + 6 dimension tables"
      sql_files:
        - "sql/model/07_dim_country.sql"
        - "sql/model/08_dim_energy_product.sql"
        - "sql/model/09_dim_balance_item.sql"
        - "sql/model/10_dim_unit.sql"
        - "sql/model/11_dim_year.sql"
        - "sql/model/12_dim_obs_status.sql"
        - "sql/model/13_fact_energy_balance.sql"
      fact_rows: 20709414

    - stage: 6_schema_tests
      name: "Star schema quality tests"
      input: "Fact_EnergyBalance + dimensions"
      output: "star_schema_test_results"
      sql_file: "sql/quality/15_star_schema_tests.sql"
      tests: 24
      result: "All PASS"

    - stage: 7_export
      name: "Parquet export"
      input: "Star schema tables"
      output: "export/parquet/*.parquet"
      sql_file: "sql/export/14_parquet_export.sql"
      compression: "ZSTD"

    - stage: 8_visualization
      name: "Power BI dashboard"
      input: "export/parquet/*.parquet"
      output: "powerbi/contract_first.pbix"
      pages: 7
      dax_measures: 9
      theme: "powerbi/themes/eu_energy_architecture.json"

  traceability: >
    Every transformation is traceable: YAML contract rule → SQL file → test result.
    No transformation exists without a documented reason in the contract.
    No data enters the dashboard without passing automated quality gates.

x_legal_basis:
  gdpr_applicable: false
  reason: No personal data.
  license: CC BY 4.0 Eurostat
  ai_act_applicable: demonstration
  ai_act_article_10_mapped: true
  enforcement_date: "2026-08-02"
